<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationery Inventory Management</title>
    link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="sidebar">
        <h2>Stationery</h2>
        <a href="#" id="menu-inventory" class="nav-link active" onclick="switchPage('inventory')">Inventory</a>
        <a href="#" id="menu-dashboard" class="nav-link" onclick="switchPage('dashboard')">Dashboard</a>
        <a href="#" id="menu-settings" class="nav-link" onclick="switchPage('settings')">Settings</a>
    </div>

    <div class="main-content">
        
        <div id="page-inventory" class="page active-page">
            <div class="container">
                <h1></h1><h1>Stationery Inventory</h1>

                <form id="add-product-form">
                    <input type="text" id="name" placeholder="Product Name" required>
                    <input type="number" id="stock" placeholder="Stock" required>
                    <input type="number" id="price" placeholder="Price" step="0.01" required>
                    <button type="submit">Add Product</button>
                </form>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Stock</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="page-dashboard" class="page">
            <div class="container">
                <h1>Dashboard</h1>
                <br>
                
        </div>

        <div id="page-settings" class="page">
            <div class="container">
                <h1>Settings</h1>
                wdwddw

                <br>
               
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'http://localhost:5015/products';

       
        function switchPage(pageName) {
        
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active-page'));

          
            const links = document.querySelectorAll('.nav-link');
            links.forEach(link => link.classList.remove('active'));

         
            document.getElementById(`page-${pageName}`).classList.add('active-page');

          
            document.getElementById(`menu-${pageName}`).classList.add('active');

         
            if (pageName === 'inventory') {
                loadProducts();
            }
        }

      
        async function loadProducts() {
            const response = await fetch(API_URL);
            const data = await response.json();
            const tbody = document.getElementById('product-table-body');
            tbody.innerHTML = data.map(p =>
                `<tr>
                    <td>${p.name}</td>
                    <td>${p.stock}</td>
                    <td>$${p.price}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                    </td>
                </tr>`
            ).join('');
        }

   
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newProduct = {
                name: document.getElementById('name').value,
                stock: parseInt(document.getElementById('stock').value),
                price: parseFloat(document.getElementById('price').value)
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newProduct)
            });

            loadProducts();
            e.target.reset();
        });

   
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                fetch(`${API_URL}/${id}`, { method: 'DELETE' })
                    .then(() => loadProducts());
            }
        }

    
        loadProducts();
    </script>
</body>

</html>
